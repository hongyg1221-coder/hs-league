<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HS 예측 리그</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f6f3; --bg3: #efede8;
    --text: #1a1a18; --text2: #6b6b65; --text3: #9b9b94;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --green: #1D9E75; --green-bg: #EAF3DE; --green-text: #27500A;
    --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --amber: #EF9F27; --amber-bg: #FAEEDA; --amber-text: #633806;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 0.5px solid var(--border); }
  .nav-brand { font-size: 16px; font-weight: 600; cursor: pointer; }
  .nav-right { display: flex; gap: 8px; }
  .nav-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); }
  .nav-btn:hover { background: var(--bg2); }
  .nav-btn.active { background: var(--text); color: var(--bg); border-color: transparent; }
  .page { display: none; padding: 24px 20px; max-width: 680px; margin: 0 auto; }
  .page.show { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 12px; }
  .card.voted-yes { border-color: var(--green); }
  .card.voted-no { border-color: var(--red); }
  .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .badge-금리 { background: var(--blue-bg); color: var(--blue-text); }
  .badge-지정학 { background: var(--red-bg); color: var(--red-text); }
  .badge-관세 { background: var(--amber-bg); color: var(--amber-text); }
  .badge-국내 { background: var(--green-bg); color: var(--green-text); }
  .badge-기업 { background: var(--purple-bg); color: var(--purple-text); }
  .badge-yes { background: var(--green-bg); color: var(--green-text); }
  .badge-no { background: var(--red-bg); color: var(--red-text); }
  .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .q-src { font-size: 12px; color: var(--text3); }
  .q-text { font-size: 16px; font-weight: 500; margin-bottom: 8px; line-height: 1.5; }
  .q-criteria { font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.6; }
  .q-vote { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .vote-btn { padding: 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); cursor: pointer; text-align: center; font-size: 14px; font-weight: 500; transition: all 0.15s; }
  .vote-btn.yes { border-color: var(--green); background: var(--green-bg); color: var(--green-text); }
  .vote-btn.no { border-color: var(--red); background: var(--red-bg); color: var(--red-text); }
  .vote-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .q-bar-wrap { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .q-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
  .q-bar-pcts { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }
  .q-count { font-size: 11px; color: var(--text3); text-align: center; margin-top: 6px; }
  .resolve-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }
  .result-banner { padding: 8px 12px; border-radius: var(--radius); text-align: center; font-size: 13px; font-weight: 500; margin-bottom: 10px; }
  .result-yes { background: var(--green-bg); color: var(--green-text); }
  .result-no { background: var(--red-bg); color: var(--red-text); }
  .admin-tabs { display: flex; gap: 6px; margin-bottom: 20px; border-bottom: 0.5px solid var(--border); padding-bottom: 12px; flex-wrap: wrap; }
  .atab { padding: 6px 16px; border-radius: 20px; border: 0.5px solid transparent; background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); }
  .atab:hover { background: var(--bg2); }
  .atab.active { background: var(--text); color: var(--bg); }
  .atab-badge { display: inline-block; background: var(--red); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: 4px; }
  .aq-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px; }
  .aq-card.approved { border-color: var(--green); }
  .aq-card.rejected { opacity: 0.4; }
  .aq-card.live { border-color: var(--blue-text); }
  .aq-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .aq-title { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; line-height: 1.5; }
  .aq-meta { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
  .aq-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .act { padding: 5px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; font-size: 12px; cursor: pointer; color: var(--text2); white-space: nowrap; }
  .act:hover { background: var(--bg2); }
  .act-ok { border-color: var(--green); color: var(--green-text); }
  .act-ok:hover, .act-ok.done { background: var(--green-bg); }
  .act-edit { border-color: var(--amber); color: var(--amber-text); }
  .act-edit:hover { background: var(--amber-bg); }
  .act-del { border-color: var(--red); color: var(--red-text); }
  .act-del:hover { background: var(--red-bg); }
  .act-resolve-yes { border-color: var(--green); color: var(--green-text); background: var(--green-bg); font-weight: 500; }
  .act-resolve-no { border-color: var(--red); color: var(--red-text); background: var(--red-bg); font-weight: 500; }
  .edit-form { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); display: none; }
  .edit-form.open { display: block; }
  .form-group { margin-bottom: 12px; }
  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  input[type=text], textarea, select { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--text); }
  textarea { resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .save-btn { padding: 7px 16px; border-radius: var(--radius); border: 0.5px solid var(--green); background: var(--green-bg); font-size: 13px; cursor: pointer; color: var(--green-text); }
  .cancel-btn { padding: 7px 16px; border-radius: var(--radius); border: 0.5px solid var(--border); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); }
  .section-title { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
  .stat-box { background: var(--bg2); border-radius: var(--radius); padding: 10px; text-align: center; }
  .stat-n { font-size: 20px; font-weight: 500; }
  .stat-l { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .week-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); }
  .tab.active { background: var(--text); color: var(--bg); border-color: transparent; }
  .pub-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .pub-progress { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .pub-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
  .btn { padding: 9px 18px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; font-size: 14px; cursor: pointer; color: var(--text); }
  .btn:hover { background: var(--bg2); }
  .btn-green { background: var(--green); color: #fff; border-color: transparent; }
  .btn-green:hover { opacity: 0.85; }
  .btn-green:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
  .btn-red { background: var(--red); color: #fff; border-color: transparent; }
  .resolve-panel { background: var(--amber-bg); border: 0.5px solid var(--amber); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .resolve-title { font-size: 12px; font-weight: 500; color: var(--amber-text); margin-bottom: 6px; }
  .resolve-q { font-size: 14px; font-weight: 500; margin-bottom: 6px; line-height: 1.5; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .dot-ok { background: var(--green); }
  .dot-del { background: var(--red); }
  .dot-wait { background: var(--bg3); border: 1px solid var(--border2); }
  .dot-live { background: var(--blue-text); }
  .order-btns { display: flex; gap: 4px; margin-left: auto; }
  .divider { height: 0.5px; background: var(--border); margin: 20px 0; }
  .empty { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; line-height: 1.8; }
  .loading { text-align: center; padding: 32px; color: var(--text3); }
  .toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 200; white-space: nowrap; }
  .toast.show { display: block; }
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .confirm-overlay.show { display: flex; }
  .confirm-box { background: var(--bg); border-radius: var(--radius-lg); padding: 24px; max-width: 320px; width: 90%; }
  .confirm-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .confirm-msg { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
  .confirm-btns { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand" onclick="showPage('home')">HS 예측 리그</div>
  <div class="nav-right">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">예측하기</button>
    <button class="nav-btn" id="nav-rank" onclick="showPage('rank')">랭킹</button>
    <button class="nav-btn" id="nav-admin" onclick="showPage('admin-login')" style="display:none">관리자</button>
  </div>
</nav>

<div class="page show" id="page-home">
  <div class="section-title">이번 주 예측 질문</div>
  <div class="section-sub" id="home-week-label">불러오는 중...</div>
  <div class="week-tabs" id="weekTabs"></div>
  <div id="questionList"><div class="loading">불러오는 중...</div></div>
</div>

<div class="page" id="page-rank">
  <div class="section-title">예측 현황</div>
  <div class="section-sub">판정 완료 후 적중률 순위가 공개됩니다</div>
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-n" id="rk-total">-</div><div class="stat-l">총 질문</div></div>
    <div class="stat-box"><div class="stat-n" id="rk-resolved">-</div><div class="stat-l">판정 완료</div></div>
    <div class="stat-box"><div class="stat-n" id="rk-votes">-</div><div class="stat-l">총 투표</div></div>
    <div class="stat-box"><div class="stat-n" id="rk-yes">-%</div><div class="stat-l">YES 정답률</div></div>
  </div>
  <div id="rankList"></div>
</div>

<div class="page" id="page-admin-login">
  <div class="section-title">관리자 로그인</div>
  <div class="section-sub">편집자 전용 대시보드</div>
  <div class="card" style="max-width:340px;">
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="adminPw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <button class="btn btn-green" style="width:100%" onclick="adminLogin()">로그인</button>
    <div id="loginError" style="color:var(--red);font-size:13px;margin-top:8px;display:none">비밀번호가 틀렸습니다.</div>
  </div>
</div>

<div class="page" id="page-admin">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <div class="section-title">관리자 대시보드</div>
    <button class="btn" onclick="adminLogout()" style="font-size:12px;padding:5px 12px;">로그아웃</button>
  </div>
  <div class="admin-tabs">
    <button class="atab active" id="atab-draft" onclick="switchTab('draft')">이번 주 편집</button>
    <button class="atab" id="atab-live" onclick="switchTab('live')">라이브 질문</button>
    <button class="atab" id="atab-resolve" onclick="switchTab('resolve')">판정 대기 <span class="atab-badge" id="resolve-badge" style="display:none">0</span></button>
    <button class="atab" id="atab-add" onclick="switchTab('add')">질문 추가</button>
  </div>

  <div id="tab-draft">
    <div class="pub-bar">
      <div class="pub-progress"><div class="pub-fill" id="pubBar" style="width:0%"></div></div>
      <span id="pubCount" style="font-size:12px;color:var(--text2);white-space:nowrap">0 / 5</span>
      <button class="btn btn-green" id="publishBtn" disabled onclick="publishWeek()">발행하기</button>
    </div>
    <div id="draftList"><div class="loading">불러오는 중...</div></div>
  </div>

  <div id="tab-live" style="display:none">
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">현재 사용자에게 보이는 질문입니다. 수정·삭제·순서 변경이 가능합니다.</div>
    <div id="liveList"><div class="loading">불러오는 중...</div></div>
  </div>

  <div id="tab-resolve" style="display:none">
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">판정일이 지난 질문에 결과를 입력해주세요.</div>
    <div id="resolveList"><div class="loading">불러오는 중...</div></div>
  </div>

  <div id="tab-add" style="display:none">
    <div class="card">
      <div class="form-group"><label>카테고리</label>
        <select id="nCat"><option>금리</option><option>지정학</option><option>관세</option><option>국내</option><option>기업</option></select>
      </div>
      <div class="form-group"><label>예측 질문</label><textarea id="nQ" rows="2" placeholder="예: 비트코인은 6월 말까지 10만 달러를 회복할까?"></textarea></div>
      <div class="form-group"><label>판정 기준</label><textarea id="nC" rows="2" placeholder="예: 6월 30일 기준 비트코인 종가 $100,000 이상 시 YES"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>판정일 (YYYY-MM-DD)</label><input type="text" id="nD" placeholder="2026-06-30"></div>
        <div class="form-group"><label>포인트</label><input type="text" id="nP" value="50"></div>
      </div>
      <div class="form-group"><label>폴리마켓 원본 (선택)</label><input type="text" id="nPoly" placeholder="Fed decision in April?"></div>
      <div class="form-group"><label>폴리마켓 확률 (선택)</label><input type="text" id="nProb" placeholder="98% 동결"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-green" onclick="addQuestion()">질문 추가</button>
        <button class="btn" onclick="clearForm()">초기화</button>
      </div>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">질문 삭제</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="btn" onclick="closeConfirm()">취소</button>
      <button class="btn btn-red" id="confirmOk">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  ⚙️  여기만 본인 값으로 바꾸세요
// ═══════════════════════════════════════════
const SUPABASE_URL  = 'https://owggdrweydbqhntflhuj.supabase.co'
const SUPABASE_ANON = 'sb_publishable_J7mpZD4eO4keZa8dYdIGGg_48XBF6ue'
const ADMIN_PW      = 'hs2026admin'
// ═══════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
let currentWeek = null
let adminMode = false
let pendingQs = []
let currentTab = 'draft'
let deleteTarget = null

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'))
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('page-' + name)?.classList.add('show')
  document.getElementById('nav-' + name.split('-')[0])?.classList.add('active')
  if (name === 'home') loadHome()
  if (name === 'rank') loadRank()
  if (name === 'admin') { loadTab(currentTab); checkBadge(); }
}

function toast(msg, ms=2200) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), ms)
}

function getVoted(id) { return localStorage.getItem('v_' + id) }
function setVoted(id, c) { localStorage.setItem('v_' + id, c) }

// ── 홈 ──
async function loadHome() {
  const el = document.getElementById('questionList')
  el.innerHTML = '<div class="loading">불러오는 중...</div>'
  const { data: batches } = await sb.from('weekly_batches').select('*').eq('status','published').order('created_at',{ascending:false}).limit(4)
  if (!batches?.length) { el.innerHTML = '<div class="empty">아직 등록된 질문이 없습니다</div>'; return }
  if (!currentWeek) currentWeek = batches[0].id
  document.getElementById('weekTabs').innerHTML = batches.map((b,i) =>
    `<button class="tab${b.id===currentWeek?' active':''}" onclick="selWeek('${b.id}',this)">${i===0?'이번 주':b.week_label}</button>`).join('')
  const batch = batches.find(b=>b.id===currentWeek)||batches[0]
  document.getElementById('home-week-label').textContent = batch.week_date + ' · ' + batch.week_label
  const { data: qs } = await sb.from('questions').select('*').in('status',['live','resolved']).eq('batch_id',currentWeek).order('sort_order',{ascending:true}).order('created_at',{ascending:true})
  el.innerHTML = qs?.length ? qs.map(q=>renderQ(q)).join('') : '<div class="empty">이번 주 질문을 준비 중입니다</div>'
}

function selWeek(id, btn) {
  currentWeek = id
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  btn.classList.add('active')
  loadHome()
}

function renderQ(q) {
  const tot = (q.yes_count||0)+(q.no_count||0)
  const yp = tot>0?Math.round(q.yes_count/tot*100):50
  const voted = getVoted(q.id)
  const isR = q.status==='resolved'
  const cls = voted==='YES'?'card voted-yes':voted==='NO'?'card voted-no':'card'
  const resultBanner = isR?`<div class="result-banner result-${q.result?.toLowerCase()}">판정 결과: ${q.result} ${voted?(voted===q.result?'· 내 예측 ✓ 적중':'· 내 예측 ✗ 불일치'):''}</div>`:''
  const voteBtns = isR
    ?`<div style="text-align:center;font-size:13px;color:var(--text3);padding:8px 0;">판정 완료된 질문입니다</div>`
    :`<div class="q-vote">
        <button class="vote-btn${voted==='YES'?' yes':''}" ${voted?'disabled':''} onclick="vote('${q.id}','YES')">YES · 그렇다</button>
        <button class="vote-btn${voted==='NO'?' no':''}" ${voted?'disabled':''} onclick="vote('${q.id}','NO')">NO · 아니다</button>
      </div>`
  return `<div class="${cls}" id="q-${q.id}">
    <div class="q-meta">
      <span class="badge badge-${q.category}">${q.category}</span>
      ${isR?`<span class="badge badge-${q.result?.toLowerCase()}">${q.result} 판정</span>`:''}
      ${q.polymarket_src?`<span class="q-src">${q.polymarket_src}${q.polymarket_prob?' · '+q.polymarket_prob:''}</span>`:''}
    </div>
    <div class="q-text">${q.question_text}</div>
    <div class="q-criteria">${q.criteria}</div>
    ${resultBanner}${voteBtns}
    <div class="q-bar-wrap"><div class="q-bar-fill" style="width:${yp}%"></div></div>
    <div class="q-bar-pcts"><span style="color:var(--green-text)">YES ${yp}%</span><span style="color:var(--red-text)">NO ${100-yp}%</span></div>
    <div class="q-count">${tot}명 참여 중</div>
    <div class="resolve-row"><span>판정일 ${q.resolve_date||'-'}</span><span>${q.points||50}포인트</span></div>
  </div>`
}

async function vote(id, choice) {
  if (getVoted(id)) return
  setVoted(id, choice)
  const f = choice==='YES'?'yes_count':'no_count'
  const { data: q } = await sb.from('questions').select('yes_count,no_count').eq('id',id).single()
  await sb.from('questions').update({[f]:(q[f]||0)+1}).eq('id',id)
  toast(choice==='YES'?'✓ YES로 예측했습니다':'✓ NO로 예측했습니다')
  const { data: u } = await sb.from('questions').select('*').eq('id',id).single()
  const el = document.getElementById('q-'+id)
  if (el) el.outerHTML = renderQ(u)
}

// ── 랭킹 ──
async function loadRank() {
  const { data: qs } = await sb.from('questions').select('*').in('status',['live','resolved'])
  const res = qs?.filter(q=>q.status==='resolved')||[]
  const tot = qs?.length||0
  const votes = qs?.reduce((s,q)=>s+(q.yes_count||0)+(q.no_count||0),0)||0
  const yesW = res.filter(q=>q.result==='YES').length
  document.getElementById('rk-total').textContent = tot
  document.getElementById('rk-resolved').textContent = res.length
  document.getElementById('rk-votes').textContent = votes
  document.getElementById('rk-yes').textContent = res.length>0?Math.round(yesW/res.length*100)+'%':'-%'
  document.getElementById('rankList').innerHTML = res.length===0
    ? '<div class="empty">판정 완료된 질문이 쌓이면<br>상세 현황이 공개됩니다</div>'
    : res.map(q=>{
        const t=(q.yes_count||0)+(q.no_count||0)
        const yp=t>0?Math.round(q.yes_count/t*100):50
        return `<div class="card" style="margin-bottom:8px;">
          <div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
            <span class="badge badge-${q.category}">${q.category}</span>
            <span class="badge badge-${q.result?.toLowerCase()}">${q.result} 판정</span>
          </div>
          <div style="font-size:14px;font-weight:500;margin-bottom:6px;">${q.question_text}</div>
          <div class="q-bar-wrap"><div class="q-bar-fill" style="width:${yp}%"></div></div>
          <div class="q-bar-pcts" style="margin-top:4px;"><span style="color:var(--green-text)">YES ${yp}%</span><span style="color:var(--red-text)">NO ${100-yp}%</span></div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">총 ${t}명 참여</div>
        </div>`}).join('')
}

// ── 관리자 ──
function adminLogin() {
  if (document.getElementById('adminPw').value===ADMIN_PW) {
    adminMode=true
    document.getElementById('loginError').style.display='none'
    document.getElementById('nav-admin').style.display='block'
    showPage('admin')
  } else { document.getElementById('loginError').style.display='block' }
}
function adminLogout() { adminMode=false; document.getElementById('nav-admin').style.display='none'; showPage('home') }

function switchTab(t) {
  currentTab=t
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'))
  document.getElementById('atab-'+t)?.classList.add('active')
  ;['draft','live','resolve','add'].forEach(n=>document.getElementById('tab-'+n).style.display=n===t?'block':'none')
  loadTab(t)
}
function loadTab(t) {
  if (!adminMode) return
  if (t==='draft') loadDraft()
  if (t==='live') loadLive()
  if (t==='resolve') loadResolve()
}

async function checkBadge() {
  const today = new Date().toISOString().split('T')[0]
  const { data } = await sb.from('questions').select('id').eq('status','live').lte('resolve_date',today)
  const cnt = data?.length||0
  const b = document.getElementById('resolve-badge')
  if (cnt>0) { b.textContent=cnt; b.style.display='inline-block' } else b.style.display='none'
}

// ── 탭1: 이번 주 편집 ──
async function loadDraft() {
  const el = document.getElementById('draftList')
  el.innerHTML='<div class="loading">불러오는 중...</div>'
  const { data: batches } = await sb.from('weekly_batches').select('*').eq('status','draft').order('created_at',{ascending:false}).limit(1)
  if (!batches?.length) { el.innerHTML='<div class="empty">대기 중인 배치가 없습니다<br><br>"질문 추가" 탭에서 질문을 추가해주세요</div>'; updatePubBar([]); return }
  const { data: qs } = await sb.from('questions').select('*').eq('batch_id',batches[0].id).order('created_at')
  pendingQs = qs||[]
  el.innerHTML = (qs||[]).map(q=>renderDraftCard(q)).join('')
  updatePubBar(qs||[])
}

function renderDraftCard(q) {
  const dot = q.status==='approved'?'dot-ok':q.status==='rejected'?'dot-del':'dot-wait'
  const cls = q.status==='approved'?'aq-card approved':q.status==='rejected'?'aq-card rejected':'aq-card'
  return `<div class="${cls}" id="aq-${q.id}">
    <div class="aq-top">
      <div class="status-dot ${dot}"></div>
      <span class="badge badge-${q.category}">${q.category}</span>
      <div class="aq-title">${q.question_text}</div>
    </div>
    <div class="aq-meta">판정일 ${q.resolve_date} · ${q.points||50}포인트</div>
    <div class="aq-actions">
      <button class="act act-ok${q.status==='approved'?' done':''}" onclick="draftApprove('${q.id}')">${q.status==='approved'?'승인됨 ✓':'승인'}</button>
      <button class="act act-edit" onclick="toggleEdit('ef-${q.id}')">수정</button>
      <button class="act act-del" onclick="confirmDel('${q.id}','${q.question_text.replace(/'/g,"\\'")}','draft')">삭제</button>
    </div>
    <div class="edit-form" id="ef-${q.id}">
      <div class="form-group"><label>질문</label><textarea id="ef-q-${q.id}" rows="2">${q.question_text}</textarea></div>
      <div class="form-group"><label>판정 기준</label><textarea id="ef-c-${q.id}" rows="2">${q.criteria}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label>판정일</label><input type="text" id="ef-d-${q.id}" value="${q.resolve_date}"></div>
        <div class="form-group"><label>카테고리</label><select id="ef-cat-${q.id}">${['금리','지정학','관세','국내','기업'].map(c=>`<option${c===q.category?' selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="save-btn" onclick="saveEdit('${q.id}','draft')">저장</button>
        <button class="cancel-btn" onclick="toggleEdit('ef-${q.id}')">취소</button>
      </div>
    </div>
  </div>`
}

function toggleEdit(id) { document.getElementById(id)?.classList.toggle('open') }

async function draftApprove(id) {
  const q = pendingQs.find(x=>x.id===id)
  const ns = q?.status==='approved'?'pending':'approved'
  await sb.from('questions').update({status:ns}).eq('id',id)
  if (q) q.status=ns
  updatePubBar(pendingQs)
  const card = document.getElementById('aq-'+id)
  if (ns==='approved') {
    card.className='aq-card approved'
    card.querySelector('.status-dot').className='status-dot dot-ok'
    const btn=card.querySelector('.act-ok'); btn.textContent='승인됨 ✓'; btn.classList.add('done')
  } else {
    card.className='aq-card'
    card.querySelector('.status-dot').className='status-dot dot-wait'
    const btn=card.querySelector('.act-ok'); btn.textContent='승인'; btn.classList.remove('done')
  }
  toast(ns==='approved'?'승인했습니다':'승인을 취소했습니다')
}

function updatePubBar(qs) {
  const n = qs.filter(q=>q.status==='approved').length
  document.getElementById('pubBar').style.width=Math.min(100,Math.round(n/5*100))+'%'
  document.getElementById('pubCount').textContent=n+' / 5'
  document.getElementById('publishBtn').disabled=n<5
}

async function publishWeek() {
  const approved = pendingQs.filter(q=>q.status==='approved')
  if (approved.length<5) return
  const { data: batches } = await sb.from('weekly_batches').select('*').eq('status','draft').order('created_at',{ascending:false}).limit(1)
  if (!batches?.length) return
  await sb.from('weekly_batches').update({status:'published',published_at:new Date().toISOString()}).eq('id',batches[0].id)
  await sb.from('questions').update({status:'live',published_at:new Date().toISOString()}).in('id',approved.map(q=>q.id))
  toast('🎉 이번 주 질문이 발행됐습니다!')
  setTimeout(()=>{currentWeek=null;showPage('home')},1500)
}

// ── 탭2: 라이브 질문 ──
async function loadLive() {
  const el = document.getElementById('liveList')
  el.innerHTML='<div class="loading">불러오는 중...</div>'
  const { data: qs } = await sb.from('questions').select('*').eq('status','live').order('sort_order',{ascending:true}).order('created_at',{ascending:true})
  if (!qs?.length) { el.innerHTML='<div class="empty">현재 라이브 중인 질문이 없습니다</div>'; return }
  el.innerHTML = qs.map((q,i)=>renderLiveCard(q,i,qs.length)).join('')
}

function renderLiveCard(q,idx,total) {
  const tot=(q.yes_count||0)+(q.no_count||0)
  const yp=tot>0?Math.round(q.yes_count/tot*100):50
  return `<div class="aq-card live" id="lq-${q.id}">
    <div class="aq-top">
      <div class="status-dot dot-live"></div>
      <span class="badge badge-${q.category}">${q.category}</span>
      <div class="aq-title">${q.question_text}</div>
      <div class="order-btns">
        ${idx>0?`<button class="act" style="padding:4px 8px;" onclick="moveQ('${q.id}','up')">↑</button>`:''}
        ${idx<total-1?`<button class="act" style="padding:4px 8px;" onclick="moveQ('${q.id}','down')">↓</button>`:''}
      </div>
    </div>
    <div class="aq-meta">YES ${yp}% · ${tot}명 참여 · 판정일 ${q.resolve_date}</div>
    <div class="aq-actions">
      <button class="act act-edit" onclick="toggleEdit('lef-${q.id}')">수정</button>
      <button class="act act-del" onclick="confirmDel('${q.id}','${q.question_text.replace(/'/g,"\\'")}','live')">삭제</button>
    </div>
    <div class="edit-form" id="lef-${q.id}">
      <div class="form-group"><label>질문</label><textarea id="lef-q-${q.id}" rows="2">${q.question_text}</textarea></div>
      <div class="form-group"><label>판정 기준</label><textarea id="lef-c-${q.id}" rows="2">${q.criteria}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label>판정일</label><input type="text" id="lef-d-${q.id}" value="${q.resolve_date}"></div>
        <div class="form-group"><label>카테고리</label><select id="lef-cat-${q.id}">${['금리','지정학','관세','국내','기업'].map(c=>`<option${c===q.category?' selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="save-btn" onclick="saveEdit('${q.id}','live')">저장</button>
        <button class="cancel-btn" onclick="toggleEdit('lef-${q.id}')">취소</button>
      </div>
    </div>
  </div>`
}

async function moveQ(id, dir) {
  const { data: qs } = await sb.from('questions').select('id,sort_order,created_at').eq('status','live').order('sort_order',{ascending:true}).order('created_at',{ascending:true})
  const idx = qs.findIndex(q=>q.id===id)
  const si = dir==='up'?idx-1:idx+1
  if (si<0||si>=qs.length) return
  const a=qs[idx], b=qs[si]
  await sb.from('questions').update({sort_order:b.sort_order??si}).eq('id',a.id)
  await sb.from('questions').update({sort_order:a.sort_order??idx}).eq('id',b.id)
  toast('순서를 변경했습니다'); loadLive()
}

// ── 탭3: 판정 대기 ──
async function loadResolve() {
  const el = document.getElementById('resolveList')
  el.innerHTML='<div class="loading">불러오는 중...</div>'
  const today = new Date().toISOString().split('T')[0]
  const { data: qs } = await sb.from('questions').select('*').eq('status','live').lte('resolve_date',today).order('resolve_date')
  if (!qs?.length) { el.innerHTML='<div class="empty">판정이 필요한 질문이 없습니다<br><br>판정일이 지난 질문이 여기에 나타납니다</div>'; return }
  el.innerHTML = qs.map(q=>`
    <div class="resolve-panel" id="rq-${q.id}">
      <div class="resolve-title">판정 대기 · 판정일 ${q.resolve_date}</div>
      <div class="resolve-q">${q.question_text}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">${q.criteria}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px;">YES ${q.yes_count||0}명 · NO ${q.no_count||0}명 · 총 ${(q.yes_count||0)+(q.no_count||0)}명</div>
      <div style="display:flex;gap:8px;">
        <button class="act act-resolve-yes" onclick="resolveQ('${q.id}','YES')">YES 판정</button>
        <button class="act act-resolve-no" onclick="resolveQ('${q.id}','NO')">NO 판정</button>
      </div>
    </div>`).join('')
}

async function resolveQ(id, result) {
  await sb.from('questions').update({status:'resolved',result}).eq('id',id)
  toast(result+' 판정 완료!')
  document.getElementById('rq-'+id)?.remove()
  checkBadge()
  if (!document.querySelector('.resolve-panel')) document.getElementById('resolveList').innerHTML='<div class="empty">모든 판정이 완료됐습니다</div>'
}

// ── 공통: 수정 저장 ──
async function saveEdit(id, mode) {
  const p = mode==='live'?'lef':'ef'
  const qt = document.getElementById(`${p}-q-${id}`)?.value.trim()
  const cr = document.getElementById(`${p}-c-${id}`)?.value.trim()
  const dt = document.getElementById(`${p}-d-${id}`)?.value.trim()
  const ct = document.getElementById(`${p}-cat-${id}`)?.value
  if (!qt||!cr||!dt) { toast('빈 항목이 있습니다'); return }
  await sb.from('questions').update({question_text:qt,criteria:cr,resolve_date:dt,category:ct}).eq('id',id)
  toast('수정됐습니다')
  mode==='live'?loadLive():loadDraft()
}

// ── 공통: 삭제 ──
function confirmDel(id, title, mode) {
  deleteTarget={id,mode}
  document.getElementById('confirmMsg').textContent=`"${title.substring(0,40)}..." 질문을 삭제합니다. 복구할 수 없습니다.`
  document.getElementById('confirmOk').onclick=doDelete
  document.getElementById('confirmOverlay').classList.add('show')
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('show'); deleteTarget=null }
async function doDelete() {
  if (!deleteTarget) return
  await sb.from('questions').delete().eq('id',deleteTarget.id)
  closeConfirm(); toast('삭제됐습니다')
  if (deleteTarget.mode==='live') loadLive()
  else { pendingQs=pendingQs.filter(q=>q.id!==deleteTarget.id); loadDraft() }
}

// ── 질문 추가 ──
async function addQuestion() {
  const cat=document.getElementById('nCat').value
  const qt=document.getElementById('nQ').value.trim()
  const cr=document.getElementById('nC').value.trim()
  const dt=document.getElementById('nD').value.trim()
  const pts=parseInt(document.getElementById('nP').value)||50
  const poly=document.getElementById('nPoly').value.trim()
  const prob=document.getElementById('nProb').value.trim()
  if (!qt||!cr||!dt) { toast('질문, 판정기준, 날짜를 입력해주세요'); return }
  let { data: batches } = await sb.from('weekly_batches').select('*').eq('status','draft').order('created_at',{ascending:false}).limit(1)
  let batchId
  if (!batches?.length) {
    const { data: nb } = await sb.from('weekly_batches').insert({week_label:getWL(),week_date:getWD(),status:'draft'}).select().single()
    batchId=nb.id
  } else batchId=batches[0].id
  await sb.from('questions').insert({batch_id:batchId,category:cat,question_text:qt,criteria:cr,resolve_date:dt,points:pts,polymarket_src:poly||null,polymarket_prob:prob||null,status:'pending'})
  toast('질문이 추가됐습니다'); clearForm(); switchTab('draft')
}
function clearForm() { ['nQ','nC','nD','nPoly','nProb'].forEach(id=>document.getElementById(id).value=''); document.getElementById('nP').value='50' }
function getWL() { const n=new Date(),y=n.getFullYear(),w=Math.ceil(((n-new Date(y,0,1))/86400000+1)/7); return `${y}-W${String(w).padStart(2,'0')}` }
function getWD() { const n=new Date(),m=new Date(n); m.setDate(n.getDate()-n.getDay()+1); const s=new Date(m); s.setDate(m.getDate()+6); const f=d=>`${d.getMonth()+1}월 ${d.getDate()}일`; return `${f(m)} – ${f(s)}` }

loadHome()
</script>
</body>
</html>
